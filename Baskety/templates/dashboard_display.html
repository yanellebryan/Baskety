<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baskety Display</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        .slide {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
        }
    </style>
</head>

<body>
    <script src="//unpkg.com/alpinejs" defer></script>
    <div id="slideshow" class="relative w-full h-full" x-data="{
            active: 0,
            slides: [
                '{% static 'img/dashboard_slide_1.jpg' %}',
                '{% static 'img/dashboard_slide_2.jpg' %}'
            ],
            init() {
                setInterval(() => {
                    this.active = (this.active + 1) % this.slides.length;
                }, 5000);
            }
         }">

        <template x-for="(slide, index) in slides" :key="index">
            <img :src="slide" x-show="active === index" x-transition:enter="transition ease-out duration-1000"
                x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
                x-transition:leave="transition ease-in duration-1000" x-transition:leave-start="opacity-100"
                x-transition:leave-end="opacity-0" class="slide absolute inset-0 object-cover w-full h-full"
                alt="Display Slide">
        </template>

        <!-- Darker Overlay for better text contrast -->
        <div class="absolute inset-0 bg-black/30 pointer-events-none"></div>

        <!-- Glassmorphism Text Box -->
        <div
            class="absolute inset-0 flex flex-col justify-center items-center text-center z-10 px-4 pointer-events-none">
            <div
                class="relative group pointer-events-auto px-10 py-8 rounded-3xl backdrop-blur-xl bg-white/25 border border-white/40 shadow-2xl transform transition-all hover:scale-105 duration-500">
                <img src="{% static 'img/Dashboard_Animation_GIF.gif' %}"
                    class="absolute top-0 right-0 w-32 h-32 opacity-0 scale-50 transition-all duration-700 ease-out pointer-events-none group-hover:-top-20 group-hover:-right-20 group-hover:opacity-100 group-hover:scale-125 group-hover:rotate-12"
                    alt="Welcome Animation">
                <h1 class="text-4xl md:text-8xl font-extrabold text-white tracking-tight drop-shadow-lg">
                    Welcome to <span
                        class="text-transparent bg-clip-text bg-gradient-to-r from-green-300 via-green-400 to-emerald-400 drop-shadow-[0_0_20px_rgba(74,222,128,0.6)] font-black antialiased">Baskety</span>
                </h1>
                <p class="mt-4 text-xl md:text-3xl text-gray-100 font-medium drop-shadow-md tracking-wide">
                    Your Modern POS Solution
                </p>
            </div>
        </div>

        <!-- Optional: Floating Action Button to Close/Back -->
        <button onclick="window.close()"
            class="absolute top-4 right-4 text-white bg-black bg-opacity-50 hover:bg-opacity-75 rounded-full p-2 transition opacity-0 hover:opacity-100 duration-300 z-50">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
    </div>
</body>

</html>
