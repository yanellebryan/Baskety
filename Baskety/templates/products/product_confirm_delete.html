{% extends 'base.html' %}

{% block content %}
<div class="flex items-center justify-center min-h-screen bg-gray-100 px-4">
    <div class="bg-white rounded-lg shadow-lg p-6 max-w-sm w-full text-center">
        <div class="mb-4 text-red-500 mx-auto">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mx-auto" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
        </div>
        <h3 class="text-xl font-bold text-gray-900 mb-2">Delete Product?</h3>
        <p class="text-gray-600 mb-6">Are you sure you want to delete "{{ object.name }}"? This action cannot be undone.
        </p>

        <form method="post" class="flex justify-center gap-3">
            {% csrf_token %}
            <a href="{% url 'products:product_list' %}"
                class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 font-medium">Cancel</a>
            <button type="submit"
                class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 font-bold">Delete</button>
        </form>
    </div>
</div>
{% endblock %}
