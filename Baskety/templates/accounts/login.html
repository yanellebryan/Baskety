{% extends 'base.html' %}
{% load static %}

{% block content %}
{# Hide navbar for login page #}
{% block navbar %}{% endblock %}

<div class="relative min-h-screen flex items-center justify-center overflow-hidden font-sans">
    <!-- Background Image with Overlay -->
    <div class="absolute inset-0 z-0">
        <img src="{% static 'img/login_background.png' %}" alt="Background" class="w-full h-full object-cover">
        <div class="absolute inset-0 bg-black/50 backdrop-blur-[2px]"></div>
    </div>

    <!-- Glassmorphism Login Card -->
    <div class="relative z-10 w-full max-w-md px-4">
        <div
            class="bg-white/80 backdrop-blur-xl border border-white/40 rounded-3xl shadow-[0_20px_40px_-5px_rgba(0,0,0,0.3)] p-8 md:p-10 transform transition-all hover:scale-[1.01] duration-500">

            <!-- Logo & Header -->
            <div class="flex flex-col items-center mb-8">
                <div class="p-4 bg-white/60 rounded-full shadow-lg mb-5 border border-white/50">
                    <img src="{% static 'img/logo.png' %}" alt="Baskety POS" class="h-12 w-auto drop-shadow-sm">
                </div>
                <h2 class="text-3xl font-extrabold text-gray-800 tracking-tight text-center">Welcome Back</h2>
                <p class="text-sm text-gray-600 font-medium mt-1 text-center">Sign in to your dashboard</p>
            </div>

            <form method="post" class="space-y-6">
                {% csrf_token %}

                <!-- Error Handling -->
                {% if form.errors %}
                <div class="p-4 rounded-xl bg-red-50 border border-red-100 flex items-center gap-3 animate-pulse">
                    <i data-lucide="alert-circle" class="w-5 h-5 text-red-600 flex-shrink-0"></i>
                    <p class="text-sm font-bold text-red-600">Invalid username or password.</p>
                </div>
                {% endif %}

                <!-- Username Input -->
                <div class="space-y-1.5">
                    <label for="id_username"
                        class="text-xs font-bold text-gray-500 uppercase tracking-widest ml-1">Username</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i data-lucide="user"
                                class="w-5 h-5 text-gray-400 group-focus-within:text-[#4CAF50] transition-colors"></i>
                        </div>
                        <input type="text" name="username" id="id_username" placeholder="Enter your username" required
                            class="w-full pl-11 pr-4 py-3.5 bg-gray-50/80 border border-gray-200 rounded-xl focus:bg-white focus:outline-none focus:ring-2 focus:ring-[#4CAF50]/50 focus:border-[#4CAF50] transition-all font-bold text-gray-800 placeholder-gray-400">
                    </div>
                </div>

                <!-- Password Input -->
                <div class="space-y-1.5">
                    <label for="id_password"
                        class="text-xs font-bold text-gray-500 uppercase tracking-widest ml-1">Password</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i data-lucide="lock"
                                class="w-5 h-5 text-gray-400 group-focus-within:text-[#4CAF50] transition-colors"></i>
                        </div>
                        <input type="password" name="password" id="id_password" placeholder="••••••••" required
                            class="w-full pl-11 pr-4 py-3.5 bg-gray-50/80 border border-gray-200 rounded-xl focus:bg-white focus:outline-none focus:ring-2 focus:ring-[#4CAF50]/50 focus:border-[#4CAF50] transition-all font-bold text-gray-800 placeholder-gray-400">
                    </div>
                </div>

                <!-- Action Button -->
                <button type="submit"
                    class="w-full py-4 mt-4 bg-[#4CAF50] hover:bg-[#43a047] text-white font-bold text-lg rounded-xl shadow-lg shadow-green-600/20 hover:shadow-green-600/40 hover:-translate-y-1 active:translate-y-0 transition-all duration-300 flex items-center justify-center gap-2 group">
                    <span>Log In</span>
                    <i data-lucide="arrow-right" class="w-5 h-5 group-hover:translate-x-1 transition-transform"></i>
                </button>
            </form>

            <div class="mt-8 text-center border-t border-gray-200/50 pt-6">
                <p class="text-xs text-gray-400 font-medium">Baskety POS System &copy; 2025</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
